name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Python Linter
      run: |
        # Lint only application code, ignore Django auto-generated formatting
        flake8 server/djangoapp \
        --exclude=server/djangoapp/migrations \
        --ignore=E501,W292,E231,E302,E122,E722,W293,W391

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 14

    - name: Install JSHint
      run: npm install jshint --global

    - name: Configure JSHint (Enable ES6)
      run: |
        echo '{ "esversion": 6 }' > .jshintrc

    - name: Run JS Linter
      run: |
        find ./server/database -name "*.js" -exec jshint {} +
